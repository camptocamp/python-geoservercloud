services:
  geoserver:
    image: docker.osgeo.org/geoserver:3.0.x
    ports:
      - "8080:8080"
    environment:
      GEOSERVER_DATA_DIR: /opt/app/data_dir
      CHANGE_OWNERSHIP_ON_FOLDERS: "/opt/app/data_dir /opt/geoserver_data"
      POSTGRES_JNDI_ENABLED: true
      POSTGRES_HOST: geodatabase
      POSTGRES_PORT: 5432
      POSTGRES_DB: acceptance
      POSTGRES_USERNAME: geoserver
      POSTGRES_PASSWORD: geoserver
      POSTGRES_JNDI_RESOURCE_NAME: jdbc/postgis
      INSTALL_EXTENSIONS: true
      STABLE_EXTENSIONS: "ogcapi-features"
    volumes:
      - ./geoserver_data:/opt/geoserver_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/geoserver/web/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  geodatabase:
    image: imresamu/postgis:15-3.4
    environment:
      POSTGRES_DB: acceptance
      POSTGRES_USER: geoserver
      POSTGRES_PASSWORD: geoserver
    volumes:
      - ./geodatabase:/docker-entrypoint-initdb.d:ro
    ports:
      - "6432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoserver -d acceptance"]
      interval: 5s
      timeout: 5s
      retries: 10
